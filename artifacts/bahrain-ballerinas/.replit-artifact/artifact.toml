kind = "video"
previewPath = "/"
title = "BAHRAIN Dancing Ballerinas"
version = "1.0.0"
id = "artifacts/bahrain-ballerinas"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
localPort = 20867
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/bahrain-ballerinas run dev"

[services.env]
PORT = "20867"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bahrain-ballerinas", "run", "build"]
publicDir = "artifacts/bahrain-ballerinas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
